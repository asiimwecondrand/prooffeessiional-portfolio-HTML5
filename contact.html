<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - My Professional Portfolio</title>
  <!-- Metadata and page title -->
</head>
<style>
    /* General page styling */
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
        color: white;
        margin: 0;
    }

    /* Header styling */
    header {
        text-align: center;
        padding: 20px;
        background: rgba(0,0,0,0.4);
    }

    h1 {
        letter-spacing: 2px;
    }

    /* Navigation links */
    nav a {
        margin: 10px;
        text-decoration: none;
        color: #00d4ff;
        font-weight: bold;
    }

    nav a:hover {
        color: white;
    }

    /* Main section layout */
    main {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
    }

    /* Contact form styling */
    form {
        background: white;
        color: black;
        padding: 30px;
        border-radius: 12px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    label {
        font-weight: bold;
    }

    /* Input fields and textarea */
    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    /* Focus effect for inputs */
    input:focus, textarea:focus {
        outline: none;
        border-color: #2c5364;
    }

    /* Submit button styling */
    input[type="submit"] {
        background: #2c5364;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
    }

    input[type="submit"]:hover {
        background: #1e3c72;
    }

    /* Footer styling */
    footer {
        text-align: center;
        padding: 10px;
        background: rgba(0,0,0,0.5);
    }
</style>
<body>
  <!-- Header section with navigation -->
  <header>
    <h1>Get In Touch</h1>
    <p>I would love to hear from you. Feel free to reach out for collaborations, projects or inquiries.</p>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="gallery.html">Gallery</a>
      <a href="data.html">Data</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- Intro section before the form -->
  <section style="text-align:center; margin-bottom:20px;">
    <h2>Let’s Work Together</h2>
    <p>I am open to opportunities, freelance work, and innovative collaborations.</p>
  </section>

  <!-- Main content with contact form -->
  <main>
    <form action="#" method="post">
      <!-- Name field -->
      <label for="name"> Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your full name" required>

      <!-- Email field -->
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="Enter your email address" required>

      <!-- Optional phone field -->
      <label for="phone">Phone Number (optional)</label>
      <input type="tel" id="phone" name="phone" placeholder="e.g +256 773234482">

      <!-- Message field -->
      <label for="message">Your Message</label><br>
      <textarea id="message" name="message" rows="5" cols="30" placeholder="Write your message here..." required></textarea>

      <!-- Submit button -->
      <input type="submit" value="Send message ✈️">
    </form>
  </main>

  <!-- Footer section -->
  <footer>
    <p>&copy; 2026 Condrand Atwooki - Web Designer</p>
  </footer>
</body>
</html>
