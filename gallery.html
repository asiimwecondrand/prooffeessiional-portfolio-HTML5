<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery - My Professional Portfolio</title>
<style>
/* General page styling */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f7fa;
}

/* Header styling */
header {
    background: #222;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Navigation links */
nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

nav a:hover {
    color: #00bcd4; /* Highlight color on hover */
}

/* Gallery section spacing */
section {
    padding: 20px;
}

/* Figure styling for images */
figure {
    display: inline-block;
    margin: 15px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: transform 0.3s;
}

/* Hover effect for figures */
figure:hover {
    transform: scale(1.05);
}

/* Image styling */
img {
    width: 250px;
    height: auto;
    border-radius: 10px;
}

/* Video styling */
video {
    width: 500px;
    max-width: 250px; /* Ensures responsiveness */
    border-radius: 50px;
}

/* Footer styling */
footer {
    text-align: center;
    padding: 10px;
    background: #222;
    color: white;
}
</style>
</head>
<body>
  <!-- Header with navigation -->
  <header>
    <h1>Gallery</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="gallery.html">Gallery</a>
      <a href="data.html">Data</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- Main content area -->
  <main>
    <!-- Images section -->
    <section>
      <h2>Images</h2>
      <!-- Professional headshot -->
      <figure>
        <img src="photo1.png" alt="Professional headshot">
        <figcaption>My professional headshot</figcaption>
      </figure>
      <!-- Coding project screenshot -->
      <figure>
        <img src="photo2.png" alt="Coding project screenshot">
        <figcaption>Screenshot of a coding project</figcaption>
      </figure>
      <!-- Team collaboration photo -->
      <figure>
        <img src="photo3.png" alt="Team collaboration photo">
        <figcaption>Working with my team</figcaption>
      </figure>
    </section>

    <!-- Video section -->
    <section>
      <h2>Video</h2>
      <video controls>
        <source src="video2.mp4" type="video/mp4">
        <!-- Fallback text if video is unsupported -->
        Your browser does not support the video tag.
      </video>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 condrand atwooki web designer</p>
  </footer>
</body>
</html>
